<!DOCTYPE html>
<!-- saved from url=(0107)https://img.wedos.website/stav/wedos_top/?utm_campaign=top&utm_source=itbarton.cz&utm_medium=websitefreeweb -->
<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
      <title>WEDOS - Top</title>
  	  
	  <meta name="viewport" content="width=device-width, initial-scale=1">
      <style>
        body { 
          font-family: Arial, Helvetica, sans-serif; 
          background-color: #051d31; 
          margin: 0; 
          padding: 0; 
          width: 100%;
          overflow: hidden;
        }
        .wa-wrapper { 
          margin: 0 auto; 
          padding: 15px; 
          color: #0ff; 
          text-align: center;
          line-height: 2.5;
        }  
        .wa-wrapper p { 
           margin: 0;
           padding: 15px;
        }
        .wa-cta-btn {
          padding: 7px 12px;
          background-color: #89c73d;
          color: #fff;
          border-radius: 15px;
          white-space: nowrap;
        }
        .wa-cta-btn a {
          color: #fff;
          font-weight: bold;
          text-decoration: none;   
        }
        #clearfix:after {
          content: "";
          display: table;
          clear: both;
        }
      </style>
      <script>
        window.addEventListener('resize', () => {
            resize();
        });
    
        window.addEventListener('DOMContentLoaded', () => {
            resize();
        });
    
        function resize() {
            let height = document.getElementById("clearfix").offsetHeight;
            const urlParams = new URLSearchParams(window.location.search);
            let pos = false;
            if(urlParams.get('utm_campaign'))
                pos = urlParams.get('utm_campaign');
            window.parent.postMessage({"setHeight": height, "position": pos}, "*");
            console.log({"setHeight": height, "position": pos});
        }
      </script>
	</head>
	<body>
      <div class="wa-wrapper" id="clearfix">
        <p>Tento web byl vytvořen v editoru webových stránek WEDOS WebSite » <span class="wa-cta-btn"><a href="https://www.wedos.cz/website?utm_source=website_top&amp;utm_medium=text&amp;utm_campaign=website_free" target="_blank">Vyzkoušejte zdarma a bez reklam</a></span></p>      
      </div>
    
  </body></html>
